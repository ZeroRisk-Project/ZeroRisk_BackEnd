# 서버 포트 (docker-compose에서 8081로 맞춰뒀음)
server.port=8081
server.tomcat.uri-encoding=UTF-8

# ===== Oracle XE 데이터베이스 =====
spring.datasource.url=jdbc:oracle:thin:@${DB_HOST}:1521/XEPDB1?oracle.jdbc.defaultNChar=true
spring.datasource.username=zerorisk
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# ===== Redis =====
spring.data.redis.host=redis
spring.data.redis.port=6379

# ===== JWT =====
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=1800000
jwt.refresh-token-expiration=604800000

# ===== Actuator (헬스체크) =====
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always

# ===== 로깅 =====
logging.level.org.hibernate.SQL=debug

# ===== KIS 종목 마스터 파일 (인증 불필요, 공개 정적 파일) =====
kis.stock-master.kospi-url=https://new.real.download.dws.co.kr/common/master/kospi_code.mst.zip
kis.stock-master.kosdaq-url=https://new.real.download.dws.co.kr/common/master/kosdaq_code.mst.zip

# ===== KIS OpenAPI =====
kis.base-url=https://openapivts.koreainvestment.com:29443
kis.app-key=${KIS_APP_KEY}
kis.app-secret=${KIS_APP_SECRET}

# ===== OAuth2 =====
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.scope=openid,profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.jwk-set-uri=https://kauth.kakao.com/.well-known/jwks.json
spring.security.oauth2.client.provider.kakao.user-name-attribute=sub

oauth2.success-redirect-url=http://52.78.187.143/oauth2/success